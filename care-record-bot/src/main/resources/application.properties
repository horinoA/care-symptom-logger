spring.application.name=care-record-bot

# サーバーポート
server.port=8080

# 親ディレクトリ（プロジェクトルート）にある .env を読み込む
spring.config.import=optional:file:../.env[.properties]

# DB接続設定（Spring Data JDBC）
spring.datasource.url=jdbc:postgresql://localhost:5432/care_dwh
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# LINE Bot設定
line.bot.channel-secret=${LINE_CHANNEL_SECRET}
line.bot.channel-token=${LINE_CHANNEL_TOKEN}
# LINE SDKの自動ハンドリングを有効化し、パスを指定
line.bot.handler.path=/api/v1/webhook/line

# メッセージソース設定
spring.messages.basename=messages,ValidationMessages
spring.messages.encoding=UTF-8
