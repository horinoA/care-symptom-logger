spring.application.name=care-record-bot

# サーバーポート
server.port=8080

# アプリ起動時に .env を読み込むためのおまじない（Spring Boot 2.4以降の機能）
spring.config.import=optional:file:.env[.properties]

# LINE Bot設定
line.bot.channel-secret=${LINE_CHANNEL_SECRET}
line.bot.channel-token=${LINE_CHANNEL_TOKEN}
# 自分でControllerのパスを指定するので、デフォルトのハンドラーパスは無効化
line.bot.handler.enabled=false 

# Spring Data JDBC (PostgreSQL) 設定
spring.datasource.url=jdbc:postgresql://localhost:5432/care_dwh
spring.datasource.username=${POSTGRES_USER}
spring.datasource.password=${POSTGRES_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
